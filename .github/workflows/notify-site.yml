name: Notify Site Repository

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Request site rebuild
        env:
          SITE_REPOSITORY: ${{ vars.SITE_REPOSITORY }}
          DISPATCH_TOKEN: ${{ secrets.SITE_REPOSITORY_DISPATCH_TOKEN }}
        run: |
          if [ -z "$SITE_REPOSITORY" ] || [ -z "$DISPATCH_TOKEN" ]; then
            echo "::error::Set SITE_REPOSITORY and SITE_REPOSITORY_DISPATCH_TOKEN before publishing content."
            exit 1
          fi
          curl --fail-with-body --request POST \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $DISPATCH_TOKEN" \
            --url "https://api.github.com/repos/$SITE_REPOSITORY/dispatches" \
            --data '{"event_type":"content-update"}'
